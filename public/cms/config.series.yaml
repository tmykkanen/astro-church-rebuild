collections:
  - name: series
    label: Sermon Series
    folder: src/content/series
    media_folder: "{{media_folder}}/series"
    slug: "{{fields.title}}"
    fields:
      - name: title
        label: Series Title
        widget: string
      - name: date
        label: Start Date
        widget: datetime
        format: "YYYY-MM-DD"
        time_format: false
      - name: image
        label: Series Image
        widget: image
      - name: books
        label: Bible Books
        widget: select
        multiple: true
        options:
          - Genesis
          - Exodus
          - Leviticus
          - Numbers
          - Deuteronomy
          - Joshua
          - Judges
          - Ruth
          - 1 Samuel
          - 2 Samuel
          - 1 Kings
          - 2 Kings
          - 1 Chronicles
          - 2 Chronicles
          - Ezra
          - Nehemiah
          - Esther
          - Job
          - Psalms
          - Proverbs
          - Ecclesiastes
          - Song of Solomon
          - Isaiah
          - Jeremiah
          - Lamentations
          - Ezekiel
          - Daniel
          - Hosea
          - Joel
          - Amos
          - Obadiah
          - Jonah
          - Micah
          - Nahum
          - Habakkuk
          - Zephaniah
          - Haggai
          - Zechariah
          - Malachi
          - Matthew
          - Mark
          - Luke
          - John
          - Acts
          - Romans
          - 1 Corinthians
          - 2 Corinthians
          - Galatians
          - Ephesians
          - Philippians
          - Colossians
          - 1 Thessalonians
          - 2 Thessalonians
          - 1 Timothy
          - 2 Timothy
          - Titus
          - Philemon
          - Hebrews
          - James
          - 1 Peter
          - 2 Peter
          - 1 John
          - 2 John
          - 3 John
          - Jude
          - Revelation
